<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnityAdmin | Secure Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1541888086225-ee5ca396d18a?w=2000&q=80') no-repeat center center/cover;
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--hero-overlay); z-index: 1;
        }
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px; width: 100%; max-width: 450px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            position: relative; z-index: 2;
        }
        .brand-icon {
            width: 80px; height: 80px; background: var(--card-bg);
            border: 1px solid var(--glass-border); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: var(--gold-solid);
            margin: -80px auto 20px auto;
            box-shadow: 0 10px 30px rgba(255,183,3,0.2);
        }
        .form-control {
            background: var(--card-bg); border: 1px solid var(--glass-border); color: var(--theme-color);
            padding: 12px 20px; font-size: 1.1rem; border-radius: 12px;
        }
        .form-control:focus {
            background: var(--card-hover); border-color: var(--gold-solid); color: var(--theme-color);
            box-shadow: 0 0 0 0.25rem rgba(255,183,3,0.2);
        }
        .btn-warning {
            background: var(--gold-gradient); color: #000; font-weight: 700; border: none;
            padding: 12px; border-radius: 12px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(255,183,3,0.3); transition: all 0.3s;
        }
        .btn-warning:hover {
            transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,183,3,0.5);
            background: linear-gradient(135deg, #FB8500, #FFB703); color: #000;
        }
    </style>
</head>
<body>

    <div class="login-card text-center text-white" data-bs-theme="dark">
        <div class="brand-icon"><i class="fas fa-hard-hat"></i></div>
        <h2 class="fw-bold mb-1">UnityAdmin</h2>
        <p class="text-muted mb-4 opacity-75">Sign in to access the control panel</p>
        
        <div id="loginError" class="alert alert-danger d-none" role="alert">
            <i class="fas fa-exclamation-circle me-1"></i> Invalid Username or Password
        </div>

        <form id="loginForm">
            <div class="mb-3 text-start">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-secondary"><i class="fas fa-user text-warning"></i></span>
                    <input type="text" id="username" class="form-control border-start-0 ps-0" placeholder="Username" required>
                </div>
            </div>
            <div class="mb-4 text-start">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-secondary"><i class="fas fa-lock text-warning"></i></span>
                    <input type="password" id="password" class="form-control border-start-0 ps-0" placeholder="Password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-warning w-100"><i class="fas fa-sign-in-alt me-2"></i> Secure Login</button>
            <a href="index.html" class="d-block mt-4 text-muted text-decoration-none hover-white"><i class="fas fa-arrow-left me-1"></i> Return to Website</a>
        </form>
    </div>

    <!-- jQuery & Bootstrap -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Check if already logged in natively
            if (localStorage.getItem('adminToken')) {
                window.location.replace('dashboard.html');
            }

            $('#loginForm').submit(function(e) {
                e.preventDefault();
                $('#loginError').addClass('d-none');
                
                const $btn = $(this).find('button[type="submit"]');
                const origText = $btn.html();
                $btn.html('<i class="fas fa-spinner fa-spin me-2"></i> Authenticating...').prop('disabled', true);

                $.ajax({
                    url: '/api/login',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        username: $('#username').val(),
                        password: $('#password').val()
                    }),
                    success: function(res) {
                        localStorage.setItem('adminToken', res.token);
                        window.location.replace('dashboard.html');
                    },
                    error: function() {
                        $('#loginError').removeClass('d-none');
                        $btn.html(origText).prop('disabled', false);
                    }
                });
            });
        });
    </script>
</body>
</html>
